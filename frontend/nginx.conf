server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Service Worker — no cache (ให้ browser รับ sw.js ใหม่เสมอ)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # manifest.webmanifest
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    # assets (JS/CSS มี content hash — cache ยาว)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # icons
    location /icons/ {
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback — hash router ไม่ต้องการ แต่ป้องกัน 404 ถ้ามีใครเปิด path ตรง
    location / {
        try_files $uri $uri/ /index.html;
    }

    # security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(self), microphone=()";
}
