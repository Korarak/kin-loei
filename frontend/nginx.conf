server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Performance ─────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   512;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/manifest+json image/svg+xml
        font/woff2 font/woff application/font-woff2;

    # ── Cache rules ──────────────────────────────

    # SW — ห้าม cache เด็ดขาด browser จะรับเวอร์ชั่นใหม่ทันที
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type  "application/manifest+json";
    }

    # assets มี content hash — cache ถาวร
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
    }

    # icons — cache 7 วัน
    location /icons/ {
        add_header Cache-Control "public, max-age=604800";
    }

    # workbox runtime files
    location /workbox- {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Security headers ─────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header X-XSS-Protection         "1; mode=block"                  always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(self), microphone=()"   always;
}
