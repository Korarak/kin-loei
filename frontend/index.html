<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0077CC">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="กินเลย">
  <meta name="description" content="ผู้ช่วยตรวจสอบความปลอดภัยของอาหาร สำหรับผู้มีโรคประจำตัวและแพ้อาหาร">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>กินเลย</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- non-blocking font load — ไม่ block render -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap">
  </noscript>
  <link rel="stylesheet" href="/src/styles/main.css">
  <!-- preconnect to backend API -->
  <link rel="dns-prefetch" href="http://localhost:18000">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-brand">
      <div class="top-bar-icon">🍽️</div>
      <span class="top-bar-name">กินเลย</span>
    </div>
  </header>

  <div id="app"></div>

  <nav id="bottom-nav" class="bottom-nav">

    <a class="tab-btn" data-href="#/scan" href="#/scan" aria-label="สแกน">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span class="tab-label">สแกน</span>
    </a>

    <a class="tab-btn" data-href="#/history" href="#/history" aria-label="ประวัติ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="tab-label">ประวัติ</span>
    </a>

    <a class="tab-btn" data-href="#/profile" href="#/profile" aria-label="โปรไฟล์">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="tab-label">โปรไฟล์</span>
    </a>

  </nav>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
