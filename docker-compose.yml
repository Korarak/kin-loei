services:
  backend:
    build: ./backend
    container_name: kinloei-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: kinloei-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kinloei}
      POSTGRES_USER: ${POSTGRES_USER:-kinloei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kinloei}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
